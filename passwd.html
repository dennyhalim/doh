<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PassGen</title>
<style>
:root {
  --bg:      #0e0e11;
  --paper:   #141418;
  --ink:     #e8e6e0;
  --sub:     #5a5870;
  --rule:    #242430;
  --accent:  #ff6b6b;
  --accdim:  rgba(255,107,107,.08);
  --green:   #3ddc84;
  --mono:    "Courier New", Courier, monospace;
  --serif:   Georgia, "Times New Roman", serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--mono);
  min-height: 100vh;
  padding: 40px 20px 60px;
}

/* paper texture via repeating gradient */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: repeating-linear-gradient(
    0deg, transparent, transparent 27px, rgba(255,255,255,.025) 27px, rgba(255,255,255,.025) 28px
  );
  pointer-events: none;
  z-index: 0;
}

.wrap {
  position: relative;
  max-width: 680px;
  margin: 0 auto;
  z-index: 1;
}

/* ── header ── */
header {
  border-bottom: 3px double var(--ink);
  padding-bottom: 14px;
  margin-bottom: 28px;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}

header h1 {
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -.01em;
}

header h1 span { color: var(--accent); }

.tagline {
  font-size: 10px;
  color: var(--sub);
  letter-spacing: .12em;
  text-transform: uppercase;
}

/* ── options panel ── */
.options {
  background: var(--paper);
  border: 1px solid var(--rule);
  border-left: 3px solid var(--ink);
  padding: 18px 20px;
  margin-top: 28px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px 28px;
}

@media (max-width: 480px) { .options { grid-template-columns: 1fr; } }

.opt-group { display: flex; flex-direction: column; gap: 5px; }

.opt-group label {
  font-size: 9px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--sub);
}

.opt-row { display: flex; align-items: center; gap: 8px; }

input[type="number"] {
  width: 52px;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--rule);
  padding: 3px 4px;
  font: inherit;
  font-size: 14px;
  color: var(--ink);
  outline: none;
  text-align: center;
  transition: border-color .15s;
}
input[type="number"]:focus { border-color: var(--ink); }

.opt-row span { font-size: 11px; color: var(--sub); }

/* toggle switch */
.toggle {
  position: relative;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  user-select: none;
}

.toggle input { position: absolute; opacity: 0; width: 0; height: 0; }

.toggle-track {
  width: 32px; height: 16px;
  background: var(--rule);
  border-radius: 8px;
  transition: background .2s;
  flex-shrink: 0;
}

.toggle input:checked ~ .toggle-track { background: var(--ink); }

.toggle-thumb {
  position: absolute;
  left: 2px; top: 2px;
  width: 12px; height: 12px;
  background: var(--bg);
  border-radius: 50%;
  transition: transform .2s;
  pointer-events: none;
}

.toggle input:checked ~ .toggle-track .toggle-thumb { transform: translateX(16px); }

.toggle-label { font-size: 12px; color: var(--ink); }

/* sub-option (indent) */
.sub-opt {
  margin-left: 2px;
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}

.radio-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  cursor: pointer;
  font-size: 11px;
  color: var(--sub);
  transition: color .15s;
}
.radio-pill input { accent-color: var(--ink); cursor: pointer; }
.radio-pill:has(input:checked) { color: var(--ink); font-weight: 700; }

/* ── regen button ── */
.regen-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.regen-row p {
  font-size: 10px;
  color: var(--sub);
  letter-spacing: .1em;
  text-transform: uppercase;
}

button.regen {
  background: var(--ink);
  color: var(--bg);
  border: none;
  border-radius: 1px;
  padding: 7px 18px;
  font: inherit;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  cursor: pointer;
  transition: opacity .15s;
}
button.regen:hover { opacity: .75; }
button.regen:active { opacity: .6; }

/* ── password list ── */
.pw-list { display: flex; flex-direction: column; gap: 6px; }

.pw-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  background: var(--paper);
  border: 1px solid var(--rule);
  padding: 12px 16px;
  cursor: pointer;
  transition: border-color .15s, background .15s;
  animation: fadeIn .25s ease both;
}

.pw-item:hover { border-color: var(--ink); background: #1a1a20; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}

.pw-text {
  font-size: 16px;
  letter-spacing: .04em;
  word-break: break-all;
  line-height: 1.4;
}

/* colored segments */
.pw-text .seg-word   { color: var(--ink); }
.pw-text .seg-num    { color: var(--accent); font-weight: 700; }
.pw-text .seg-sep    { color: var(--sub); }
.pw-text .seg-sym    { color: #8e44ad; font-weight: 700; }
.pw-text .seg-leet   { color: #2980b9; }

.copy-hint {
  font-size: 9px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--sub);
  white-space: nowrap;
  flex-shrink: 0;
  transition: color .15s;
}

.pw-item:hover .copy-hint { color: var(--ink); }
.pw-item.copied { border-color: var(--green); background: rgba(39,174,96,.06); }
.pw-item.copied .copy-hint { color: var(--green); }

/* ── footer ── */
footer {
  margin-top: 36px;
  border-top: 1px solid var(--rule);
  padding-top: 12px;
  font-size: 10px;
  color: var(--sub);
  letter-spacing: .06em;
}
</style>
</head>
<body id="denny.wordpress.com">
<div class="wrap">

  <header>
    <h1>Pass<span>Gen</span></h1>
    <span class="tagline">Memorable · Offline · Secure</span>
  </header>

  <!-- LIST -->
  <div class="regen-row">
    <p>10 passwords — click any to copy</p>
    <button class="regen" onclick="generate()">↺ Regenerate</button>
  </div>

  <div class="pw-list" id="pwList"></div>

  <!-- OPTIONS -->
  <div class="options">

    <div class="opt-group">
      <label>Word length (chars)</label>
      <div class="opt-row">
        <input type="number" id="wordLen" value="10" min="5" max="29"/>
        <span>letters</span>
      </div>
    </div>

    <div class="opt-group">
      <label>Number length (digits)</label>
      <div class="opt-row">
        <input type="number" id="numLen" value="3" min="1" max="11"/>
        <span>digits</span>
      </div>
    </div>

    <div class="opt-group">
      <label>Uppercase separator</label>
      <label class="toggle">
        <input type="checkbox" id="optUpper" checked/>
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
        <span class="toggle-label">Split words with Capital</span>
      </label>
    </div>

    <div class="opt-group">
      <label>Leet substitutions</label>
      <label class="toggle">
        <input type="checkbox" id="optLeet"/>
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
        <span class="toggle-label">Replace a→4, e→3, o→0…</span>
      </label>
    </div>

    <div class="opt-group" style="grid-column: 1 / -1;">
      <label>Symbols</label>
      <label class="toggle">
        <input type="checkbox" id="optSym"/>
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
        <span class="toggle-label">Add symbols</span>
      </label>
      <div class="sub-opt" id="symPlaceWrap" style="display:none; margin-top:6px;">
        <label class="radio-pill">
          <input type="radio" name="symPlace" value="end" checked/> At the end
        </label>
        <label class="radio-pill">
          <input type="radio" name="symPlace" value="sep"/> As word separator
        </label>
      </div>
    </div>

  </div>

  <footer>Generated entirely in your browser. Nothing is sent anywhere. denny.wordpress.com</footer>
</div>

<script>
// ── syllable bank for pronounceable words ──────────────────────
const ONSET  = ['b','c','d','f','g','h','j','k','l','m','n','p','r','s','t','v','w','z',
                 'br','cl','dr','fl','fr','gl','gr','pl','pr','sl','sm','sn','sp','st','sw','tr'];
const VOWEL  = ['a','e','i','o','u','ai','ay','ea','ee','oo','ou','ie'];
const CODA   = ['','','','n','m','l','r','s','t','nd','ng','nk','st','ld','rd'];
const SYMS   = ['!','@','#','$','%','&','*','+','=','?'];
const LEET   = { a:'4', e:'3', i:'1', o:'0', s:'5', t:'7', b:'8', g:'9' };

function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function syllable() { return rand(ONSET) + rand(VOWEL) + rand(CODA); }

function makeWord(targetLen) {
  let w = '';
  while (w.length < targetLen) w += syllable();
  // trim to exact length at a syllable boundary isn't always clean — just slice
  return w.slice(0, targetLen);
}

function makeNumber(len) {
  if (len === 0) return '';
  let n = '';
  for (let i = 0; i < len; i++) n += randInt(0, 9);
  return n;
}

// ── rendering with colored spans ──────────────────────────────
function span(cls, text) {
  return `<span class="${cls}">${text}</span>`;
}

function applyLeet(word) {
  // returns array of {text, leet} per char for coloring
  return word.split('').map(c => {
    const sub = LEET[c.toLowerCase()];
    return sub ? { text: sub, leet: true } : { text: c, leet: false };
  });
}

function renderWord(word, useUpper, useLeet, isSecond) {
  // optionally capitalize first letter (as separator between parts)
  let chars = word.split('');
  if (useUpper && isSecond) chars[0] = chars[0].toUpperCase();

  let html = '';
  chars.forEach((c, i) => {
    if (useLeet) {
      const key = c.toLowerCase();
      const sub = LEET[key];
      if (sub) {
        // preserve uppercase if it was capitalized
        html += span('seg-leet', c === c.toUpperCase() ? sub.toUpperCase() : sub);
        return;
      }
    }
    html += span('seg-word', c);
  });
  return html;
}

function buildPassword() {
  const wordLen = Math.max(4, parseInt(document.getElementById('wordLen').value) || 10);
  const numLen  = Math.max(0, parseInt(document.getElementById('numLen').value)  || 0);
  const useUpper = document.getElementById('optUpper').checked;
  const useLeet  = document.getElementById('optLeet').checked;
  const useSym   = document.getElementById('optSym').checked;
  const symPlace = document.querySelector('input[name="symPlace"]:checked')?.value || 'end';

  // split word length roughly in half when using uppercase separator
  let plain = '', html = '';

  if (useUpper) {
    const half1 = Math.ceil(wordLen / 2);
    const half2 = wordLen - half1;
    const w1 = makeWord(half1);
    const w2 = makeWord(half2);

    if (useSym && symPlace === 'sep') {
      const sym = rand(SYMS);
      plain = w1 + sym + w2[0].toUpperCase() + w2.slice(1);
      html  = renderWord(w1, false, useLeet, false)
            + span('seg-sym', sym)
            + renderWord(w2, true, useLeet, true);
    } else {
      plain = w1 + w2[0].toUpperCase() + w2.slice(1);
      html  = renderWord(w1, false, useLeet, false)
            + renderWord(w2, true, useLeet, true);
    }
  } else {
    const w = makeWord(wordLen);
    if (useSym && symPlace === 'sep') {
      // put symbol in the middle
      const mid = Math.floor(wordLen / 2);
      const sym = rand(SYMS);
      plain = w.slice(0, mid) + sym + w.slice(mid);
      html  = renderWord(w.slice(0, mid), false, useLeet, false)
            + span('seg-sym', sym)
            + renderWord(w.slice(mid), false, useLeet, false);
    } else {
      plain = w;
      html  = renderWord(w, false, useLeet, false);
    }
  }

  // numbers
  if (numLen > 0) {
    const nums = makeNumber(numLen);
    plain += nums;
    html  += span('seg-num', nums);
  }

  // symbol at end
  if (useSym && symPlace === 'end') {
    const sym = rand(SYMS);
    plain += sym;
    html  += span('seg-sym', sym);
  }

  return { plain, html };
}

function generate() {
  const list = document.getElementById('pwList');
  list.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const { plain, html } = buildPassword();
    const item = document.createElement('div');
    item.className = 'pw-item';
    item.style.animationDelay = (i * 30) + 'ms';
    item.innerHTML = `<span class="pw-text">${html}</span><span class="copy-hint">copy</span>`;
    item.addEventListener('click', () => copyPw(item, plain));
    list.appendChild(item);
  }
}

async function copyPw(el, text) {
  try {
    await navigator.clipboard.writeText(text);
  } catch {
    // fallback for non-https
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }
  const hint = el.querySelector('.copy-hint');
  el.classList.add('copied');
  hint.textContent = 'copied!';
  setTimeout(() => {
    el.classList.remove('copied');
    hint.textContent = 'copy';
  }, 1800);
}

// ── wire up live options ────────────────────────────────────────
document.getElementById('optSym').addEventListener('change', function() {
  document.getElementById('symPlaceWrap').style.display = this.checked ? 'flex' : 'none';
  generate();
});

['wordLen','numLen','optUpper','optLeet'].forEach(id => {
  document.getElementById(id).addEventListener('change', generate);
});

document.querySelectorAll('input[name="symPlace"]').forEach(r => {
  r.addEventListener('change', generate);
});

generate();
</script>
</body>
</html>
